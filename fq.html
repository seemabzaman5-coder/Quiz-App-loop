<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <link rel="stylesheet" href="Quiz.css" />
  </head>
  <body>
    <div id="container">
      <div class="screen start active" id="startScreen">
        <h1>Quiz Time!</h1>
        <p>Test Your Knowledge about loop here</p>
        <button id="start-button">Start</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Question goes here</h2>
          <div class="quiz-info">
            <p>
              Question <span id="current-question">1</span> of
              <span id="total-questions"> 5 </span>
            </p>
            <p>Score: <span id="score"> 0 </span></p>
          </div>
        </div>

        <div class="answers-containers" id="answers-containers">
          <!-- Answer will be given here -->
        </div>
        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
      </div>

      <div class="screen" id="result-screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
          <p>
            You Scored <span id="final-score"> 0 </span> Out of
            <span id="max-score">5</span>
          </p>
          <div id="result-message">Good Job!</div>
        </div>
        <button id="restart-btn">Restart</button>
      </div>
      <script src="Quiz.js"></script>
    </div>
  </body>
</html>
